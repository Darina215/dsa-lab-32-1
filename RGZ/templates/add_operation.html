<!DOCTYPE html>
<html>
<head>
    <title>Добавить операцию</title>
</head>
<body>

    <h1>Добавить операцию</h1>

    <label>Тип операции:</label>
    <select id="type_operation">
        <option value="income">Доход</option>
        <option value="expense">Расход</option>
    </select>

    <br><br>

    <label>Сумма:</label>
    <input id="sum" type="number">

    <br><br>

    <label>Дата:</label>
    <input id="date" type="date">

    <br><br>

    <button onclick="send()">Добавить</button>

    <script>
    function send() {
        fetch("/add_operation", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                type_operation: document.getElementById("type_operation").value,
                sum: document.getElementById("sum").value,
                date: document.getElementById("date").value
            })
        }).then(() => {
            window.location.href = "/operations";
        });
    }
    </script>

</body>
</html>
