<!DOCTYPE html>
<html>
<head>
    <title>Finance Budget</title>
</head>
<body>

    <h1>Установка бюджета</h1>

    <form method="POST" action="/budget">

        <input
            type="number"
            step="0.01"
            name="amount"
            placeholder="Введите бюджет">

        <button type="submit">
            Сохранить
        </button>

    </form>

    {% if success %}
        <h3>{{ success }}</h3>
    {% endif %}

</body>
</html>
